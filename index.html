<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pleasanton Connects · The Longest Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
:root {
  --forest: #2f5d3a;
  --forest-deep: #1f4429;
  --forest-soft: #4a7a52;
  --terracotta: #c76f3d;
  --terracotta-deep: #a85a2c;
  --brown: #7a4e2a;
  --teal: #4a7a7e;
  --gold: #d9a44a;
  --cream: #f6efe3;
  --cream-warm: #f1e8d6;
  --paper: #fbf6ec;
  --ink: #1f2a22;
  --ink-soft: #3a463d;
  --muted: #6f7a70;
  --rule: #e3dac5;
  --rule-soft: #ece4d0;
  --serif: "Newsreader", "Tiempos Text", Georgia, "Times New Roman", serif;
  --sans: "DM Sans", "Söhne", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  color: var(--ink);
  background: var(--paper);
  font-size: 17px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
a { color: inherit; }
img { max-width: 100%; display: block; }
.serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
.mono { font-family: var(--mono); }
h1, h2, h3, h4 { font-family: var(--serif); font-weight: 400; letter-spacing: -0.015em; margin: 0; line-height: 1.08; text-wrap: balance; }
h1 { font-size: clamp(40px, 5vw, 76px); }
h2 { font-size: clamp(32px, 3.6vw, 52px); line-height: 1.1; }
h3 { font-size: clamp(22px, 2vw, 30px); line-height: 1.2; }
h4 { font-size: 20px; }
p { margin: 0 0 1em; text-wrap: pretty; }
.eyebrow {
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
  color: var(--forest);
}
.container { width: min(1200px, 100% - 48px); margin: 0 auto; }
.container-narrow { width: min(760px, 100% - 48px); margin: 0 auto; }
.container-wide { width: min(1380px, 100% - 48px); margin: 0 auto; }
section { padding: 96px 0; }
@media (max-width: 720px) { section { padding: 64px 0; } }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 500;
  border-radius: 999px;
  border: 1px solid transparent;
  cursor: pointer;
  text-decoration: none;
  transition: transform .15s ease, background .15s ease, color .15s ease, border-color .15s ease;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--forest); color: var(--paper); }
.btn-primary:hover { background: var(--forest-deep); }
.btn-terracotta { background: var(--terracotta); color: var(--paper); }
.btn-terracotta:hover { background: var(--terracotta-deep); }
.btn-ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
.btn-ghost:hover { background: var(--ink); color: var(--paper); }
.btn-cream { background: var(--cream); color: var(--ink); border-color: var(--rule); }
.btn-cream:hover { background: var(--cream-warm); }
.btn-link {
  background: none; border: 0; padding: 0;
  font-family: var(--sans); font-size: 15px; cursor: pointer;
  color: var(--forest); text-decoration: underline; text-underline-offset: 4px;
  text-decoration-thickness: 1px;
}
.btn-link:hover { color: var(--terracotta); }
.form-grid { display: grid; gap: 22px; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field label {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
}
.field .hint { font-size: 13px; color: var(--muted); margin-top: -2px; }
.field input[type="text"],
.field input[type="email"],
.field input[type="tel"],
.field input[type="number"],
.field select,
.field textarea {
  font-family: var(--sans);
  font-size: 16px;
  padding: 12px 14px;
  border: 1px solid var(--rule);
  border-radius: 8px;
  background: var(--paper);
  color: var(--ink);
  outline: none;
  transition: border-color .15s ease, box-shadow .15s ease;
  width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--forest);
  box-shadow: 0 0 0 3px rgba(47, 93, 58, 0.15);
}
.field textarea { min-height: 100px; resize: vertical; }
.field-error input, .field-error select, .field-error textarea {
  border-color: var(--terracotta-deep);
  box-shadow: 0 0 0 3px rgba(167, 90, 44, 0.12);
}
.field .error-msg { font-size: 13px; color: var(--terracotta-deep); }
.checks { display: flex; flex-direction: column; gap: 10px; }
.check {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--rule);
  border-radius: 10px;
  background: var(--paper);
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.check:hover { border-color: var(--forest-soft); }
.check.is-on { border-color: var(--forest); background: rgba(47, 93, 58, 0.05); }
.check input { margin-top: 4px; accent-color: var(--forest); }
.check .check-title { font-weight: 500; }
.check .check-desc { font-size: 14px; color: var(--muted); margin-top: 2px; }
.check .check-meta { font-size: 13px; color: var(--forest); margin-top: 4px; font-weight: 500; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 999px;
  border: 1px solid var(--rule); background: var(--paper);
  font-size: 14px; cursor: pointer;
  transition: border-color .15s, background .15s, color .15s;
}
.chip:hover { border-color: var(--forest-soft); }
.chip.is-on { background: var(--forest); color: var(--paper); border-color: var(--forest); }
.radio-row { display: flex; gap: 8px; flex-wrap: wrap; }
.radio-row label {
  padding: 10px 18px;
  border: 1px solid var(--rule);
  border-radius: 999px;
  cursor: pointer;
  font-size: 14px;
  background: var(--paper);
}
.radio-row input { display: none; }
.radio-row label.is-on { background: var(--forest); color: var(--paper); border-color: var(--forest); }
.card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 14px;
  padding: 28px;
}
.card-warm {
  background: var(--cream);
  border: 1px solid var(--rule);
  border-radius: 14px;
}
.divider { height: 1px; background: var(--rule); border: 0; margin: 0; }
.kbd-rule {
  border: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--rule) 20%, var(--rule) 80%, transparent);
  margin: 48px 0;
}
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(31, 42, 34, 0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  padding: 24px;
  animation: fadeIn .2s ease;
}
.modal {
  background: var(--paper);
  border-radius: 16px;
  max-width: 560px;
  width: 100%;
  max-height: 86vh;
  overflow: auto;
  padding: 36px;
  position: relative;
  animation: pop .2s ease;
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px; border-radius: 999px;
  border: 1px solid var(--rule); background: var(--paper); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.modal-close:hover { background: var(--cream); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }
@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(47, 93, 58, 0.4); }
  100% { box-shadow: 0 0 0 14px rgba(47, 93, 58, 0); }
}
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--paper);
  padding: 12px 22px; border-radius: 999px;
  font-size: 14px; z-index: 300;
  box-shadow: 0 8px 30px rgba(0,0,0,0.18);
  animation: pop .2s ease;
}
.hero {
  position: relative;
  min-height: 92vh;
  color: var(--paper);
  display: flex; align-items: flex-end;
  overflow: hidden;
  background: var(--ink);
}
.hero-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  filter: saturate(1.05);
}
.hero-grad {
  position: absolute; inset: 0;
  background:
    linear-gradient(180deg, rgba(31,42,34,0.35) 0%, rgba(31,42,34,0) 35%, rgba(31,42,34,0.6) 78%, rgba(31,42,34,0.92) 100%);
}
.hero-inner { position: relative; padding: 0 0 80px; }
.hero h1 { font-size: clamp(48px, 7vw, 108px); line-height: 0.96; max-width: 16ch; }
.hero h1 em { font-style: italic; color: var(--gold); }
.hero p.lede { font-size: clamp(17px, 1.4vw, 21px); max-width: 56ch; opacity: 0.92; }
.hero-date {
  display: inline-flex; align-items: center; gap: 14px;
  padding: 8px 16px;
  border-radius: 999px;
  background: rgba(246, 239, 227, 0.14);
  border: 1px solid rgba(246, 239, 227, 0.3);
  backdrop-filter: blur(8px);
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.hero-date .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--gold); animation: pulse-ring 2s infinite; }
.logo-mark {
  display: inline-flex; align-items: center; gap: 12px;
  font-family: var(--serif); font-style: italic; font-size: 22px;
  color: var(--forest);
  text-decoration: none;
  font-weight: 500;
}
.logo-mark .small { font-family: var(--sans); font-style: normal; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-soft); display: block; line-height: 1; }
.logo-mark .stack { display: flex; flex-direction: column; gap: 3px; }
.logo-img { height: 64px; width: auto; }
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(251, 246, 236, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid transparent;
  transition: border-color .2s, background .2s;
}
.nav.scrolled { border-color: var(--rule); }
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0;
}
.nav-links { display: flex; align-items: center; gap: 6px; }
.nav-link {
  font-size: 14.5px; font-weight: 500;
  padding: 8px 14px; border-radius: 999px;
  background: none; border: 0; cursor: pointer;
  color: var(--ink); text-decoration: none;
  transition: background .15s;
  white-space: nowrap;
}
.nav-link:hover { background: var(--cream); }
.nav-link.active { background: var(--forest); color: var(--paper); }
.nav-cta { margin-left: 8px; }
.nav-mobile-btn { display: none; }
@media (max-width: 1024px) {
  .nav-links { display: none; }
  .nav-mobile-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--ink); color: var(--paper);
    padding: 10px 16px; border-radius: 999px; border: 0;
    font-size: 14px; cursor: pointer;
  }
}
.footer {
  background: var(--ink);
  color: var(--cream);
  padding: 80px 0 40px;
}
.footer a { color: var(--cream); text-decoration: none; }
.footer a:hover { color: var(--gold); }
.footer h4 { color: var(--paper); font-family: var(--sans); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 16px; }
.footer .btn-link { white-space: nowrap; text-decoration: none; }
.footer .btn-link:hover { color: var(--gold); text-decoration: none; }
@media (max-width: 1024px) {
  .footer-grid { grid-template-columns: 1fr 1fr !important; }
}
@media (max-width: 520px) {
  .footer-grid { grid-template-columns: 1fr !important; }
}
.five-ways {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
@media (min-width: 1180px) { .five-ways { grid-template-columns: repeat(6, 1fr); } }
@media (max-width: 880px) { .five-ways { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .five-ways { grid-template-columns: 1fr; } }
.way-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 16px;
  padding: 28px 24px 24px;
  display: flex; flex-direction: column;
  gap: 14px;
  cursor: pointer;
  text-align: left;
  font: inherit; color: inherit;
  transition: transform .2s ease, border-color .2s ease, background .2s ease;
}
.way-card:hover { transform: translateY(-3px); border-color: var(--forest); background: var(--cream); }
.way-card .way-icon {
  width: 56px; height: 56px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.way-card h3 { font-family: var(--serif); font-size: 26px; }
.way-card p { font-size: 14px; color: var(--muted); margin: 0; min-height: 38px; }
.way-card .way-cta { font-size: 14px; font-weight: 500; color: var(--forest); margin-top: auto; padding-top: 8px; }
.way-card .way-cta::after { content: " →"; transition: transform .2s; display: inline-block; }
.way-card:hover .way-cta::after { transform: translateX(4px); }
.photo {
  background: var(--rule-soft);
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}
.photo.placeholder {
  background-image:
    repeating-linear-gradient(45deg, rgba(122, 78, 42, 0.08) 0 12px, rgba(122, 78, 42, 0.02) 12px 24px);
  display: flex; align-items: center; justify-content: center;
  color: var(--brown);
  font-family: var(--mono);
  font-size: 12px;
  text-align: center;
  padding: 20px;
  min-height: 200px;
  border: 1px dashed rgba(122, 78, 42, 0.4);
}
.member-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 18px;
}
.member-card {
  display: flex; flex-direction: column; gap: 10px;
  cursor: pointer;
  text-align: left;
  background: none; border: 0; padding: 0; font: inherit; color: inherit;
}
.member-card .avatar {
  aspect-ratio: 1;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--cream-warm), var(--rule));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 32px; color: var(--brown);
  transition: transform .2s ease;
}
.member-card:hover .avatar { transform: scale(1.02); box-shadow: 0 8px 24px rgba(31, 42, 34, 0.12); }
.member-card .meta { font-size: 13px; color: var(--muted); }
.member-card .name { font-family: var(--serif); font-size: 19px; }
.pull-quote {
  font-family: var(--serif);
  font-size: clamp(28px, 3vw, 42px);
  line-height: 1.2;
  color: var(--ink);
  border-left: 3px solid var(--terracotta);
  padding: 8px 0 8px 24px;
  margin: 32px 0;
  font-style: italic;
}
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 24px; }
.stat .num { font-family: var(--serif); font-size: 56px; line-height: 1; color: var(--forest); }
.stat .lbl { font-size: 14px; color: var(--muted); margin-top: 6px; }
.share-block {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 20px;
}
.share-block .share-head {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.share-block pre {
  margin: 0;
  font-family: var(--sans);
  font-size: 15px;
  white-space: pre-wrap;
  line-height: 1.5;
  color: var(--ink);
}
.tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px;
  background: var(--cream); color: var(--forest);
  font-size: 12px; letter-spacing: 0.04em; font-weight: 500;
}
.tag.terra { background: rgba(199, 111, 61, 0.14); color: var(--terracotta-deep); }
.tag.teal { background: rgba(74, 122, 126, 0.14); color: var(--teal); }
.page-fade { animation: fadeUp .35s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.ty-card {
  background: var(--cream);
  border-radius: 18px;
  padding: 56px 48px;
  text-align: center;
  border: 1px solid var(--rule);
}
.ty-card .check-circle {
  width: 64px; height: 64px; border-radius: 999px;
  background: var(--forest); color: var(--paper);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  font-size: 28px;
}
.mobile-menu {
  position: fixed; inset: 0; background: var(--paper);
  z-index: 100;
  padding: 24px;
  display: flex; flex-direction: column; gap: 8px;
  animation: fadeIn .2s ease;
}
.mobile-menu .mm-close {
  align-self: flex-end;
  padding: 10px 18px;
  border-radius: 999px;
  border: 1px solid var(--rule);
  background: var(--paper);
  font: inherit;
  cursor: pointer;
}
.mobile-menu .nav-link { font-size: 28px; padding: 16px 0; font-family: var(--serif); }
.email-preview {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 12px;
  overflow: hidden;
  font-size: 14px;
}
.email-preview .ep-head {
  background: var(--cream);
  padding: 14px 20px;
  border-bottom: 1px solid var(--rule);
  font-size: 12px; color: var(--muted);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.email-preview .ep-body { padding: 24px 28px; }
.email-preview .ep-body p { margin: 0 0 12px; line-height: 1.55; }
.tree-mark { width: 36px; height: 36px; }

/* ─── Mobile optimizations ─── */
@media (max-width: 720px) {
  body { font-size: 16px; }
  .container, .container-narrow, .container-wide { width: calc(100% - 32px); }

  /* Hero — bigger contrast scrim, smaller type, shorter section */
  .hero { min-height: 78vh; }
  .hero-inner { padding: 0 0 48px; }
  .hero h1 { font-size: 42px !important; line-height: 1.05; max-width: none; }
  .hero p.lede { font-size: 16px; line-height: 1.5; }
  .hero-date {
    font-size: 11px;
    padding: 6px 12px;
    gap: 10px;
  }
  .hero-grad {
    background:
      linear-gradient(180deg, rgba(31,42,34,0.55) 0%, rgba(31,42,34,0.25) 25%, rgba(31,42,34,0.7) 60%, rgba(31,42,34,0.95) 100%);
  }
  .hero h1, .hero p.lede { text-shadow: 0 2px 18px rgba(0,0,0,0.45); }

  /* Logo a touch smaller in nav on small screens */
  .logo-img { height: 52px; }

  /* Page headers — pull top padding in */
  header[style*="padding: 120px 0 56px"] { padding: 88px 0 36px !important; }

  /* Collapse desktop multi-column grids built with inline styles */
  [style*="grid-template-columns: 1fr 1.1fr"],
  [style*="grid-template-columns: 1fr 1.2fr"],
  [style*="grid-template-columns: 1fr 1.4fr"],
  [style*="grid-template-columns: 1fr 1fr"],
  [style*="grid-template-columns: repeat(2, 1fr)"],
  [style*="grid-template-columns: repeat(3, 1fr)"] {
    grid-template-columns: 1fr !important;
  }
  [style*="grid-template-columns: repeat(4, 1fr)"] {
    grid-template-columns: 1fr 1fr !important;
  }
  /* Ease very large container gaps */
  [style*="gap: 80"] { gap: 32px !important; }
  [style*="gap: 64"] { gap: 32px !important; }

  /* Tighten section h1/h2 */
  h1 { font-size: 36px; }
  h2 { font-size: 28px; }

  /* Email preview body padding */
  .email-preview .ep-body { padding: 20px 18px; }

  /* Thank-you card padding */
  .ty-card { padding: 40px 24px; }

  /* Stats numbers */
  .stat .num { font-size: 44px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
/* ─── Icons ─── */
const Icon = {
  Ticket: ({ size = 28, color = "currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4V8z" />
      <path d="M14 6v12" strokeDasharray="2 3" />
    </svg>
  ),
  Table: ({ size = 28, color = "currentColor" }) => (

function ToastHost() {
  const [msg, setMsg] = React.useState(null);
  React.useEffect(() => {
    window.showToast = (m) => {
      setMsg(m);
      window.clearTimeout(window.__toastT);
      window.__toastT = setTimeout(() => setMsg(null), 2400);
    };
  }, []);
  if (!msg) return null;
  return <div className="toast">{msg}</div>;
}

function Modal({ open, onClose, children }) {
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose} aria-label="Close"><Icon.X /></button>
        {children}
      </div>
    </div>
  );
}

// Event constants — used by calendar/map helpers and the details card.
const EVENT = {
  title: "The Longest Table — Pleasanton",
  // 2026-06-06 6:30pm Pacific (PDT, UTC-7) → 2026-06-07T01:30:00Z … 03:00:00Z
  startUTC: "20260607T013000Z",
  endUTC:   "20260607T030000Z",
  startISO: "2026-06-07T01:30:00Z",
  endISO:   "2026-06-07T03:00:00Z",
  location: "Main Street, Pleasanton, CA",
  details:  "An outdoor community dinner along Main Street. Bring something to eat and meet the people who live near you. Free RSVP required. https://longest-table-pleasanton.vercel.app",
};

function googleCalendarUrl() {
  const p = new URLSearchParams({
    action: "TEMPLATE",
    text: EVENT.title,
    dates: `${EVENT.startUTC}/${EVENT.endUTC}`,
    details: EVENT.details,
    location: EVENT.location,
  });
  return `https://calendar.google.com/calendar/render?${p.toString()}`;
}

function outlookCalendarUrl() {
  const p = new URLSearchParams({
    path: "/calendar/action/compose",
    rru: "addevent",
    subject: EVENT.title,
    startdt: EVENT.startISO,
    enddt: EVENT.endISO,
    body: EVENT.details,
    location: EVENT.location,
  });
  return `https://outlook.live.com/calendar/0/deeplink/compose?${p.toString()}`;
}

function downloadICS() {
  const ics = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//Pleasanton Connects//Longest Table//EN",
    "CALSCALE:GREGORIAN",
    "BEGIN:VEVENT",
    `UID:longest-table-2026-06-06@pleasantonconnects.org`,
    `DTSTAMP:${EVENT.startUTC}`,
    `DTSTART:${EVENT.startUTC}`,
    `DTEND:${EVENT.endUTC}`,
    `SUMMARY:${EVENT.title}`,
    `LOCATION:${EVENT.location}`,
    `DESCRIPTION:${EVENT.details.replace(/\n/g, "\\n")}`,
    "END:VEVENT",
    "END:VCALENDAR",
  ].join("\r\n");
  const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "longest-table-pleasanton.ics";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ─── Captcha + form submit helpers ─── */
function useCaptcha() {
  const [data, setData] = React.useState(null);
  const [answer, setAnswer] = React.useState("");
  const [loading, setLoading] = React.useState(true);
  const refresh = React.useCallback(async () => {
    setLoading(true);
    setAnswer("");
    try {
      const r = await fetch("/api/captcha");
      if (!r.ok) throw new Error("captcha");
      setData(await r.json());
    } catch {
      setData(null);
    } finally {
      setLoading(false);
    }
  }, []);
  React.useEffect(() => { refresh(); }, [refresh]);
  return { data, answer, setAnswer, loading, refresh };
}

function CaptchaField({ captcha, error }) {
  return (
    <div className="field">
      <label>{captcha.data ? captcha.data.question : "Quick human check"}</label>
      <div className="hint">A simple math check so robots can't fill the form.</div>
      <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
        <input
          type="text"
          inputMode="numeric"
          autoComplete="off"
          value={captcha.answer}
          onChange={(e) => captcha.setAnswer(e.target.value)}
          placeholder="Your answer"
          disabled={!captcha.data}
          style={{ maxWidth: 180 }}
        />
        <button type="button" className="btn-link" onClick={captcha.refresh} disabled={captcha.loading}>
          New question
        </button>
      </div>
      {error && <div className="error-msg">{error}</div>}
    </div>
  );
}

function Honeypot({ value, onChange }) {
  return (
    <div aria-hidden="true" style={{ position: "absolute", left: "-10000px", top: "auto", width: 1, height: 1, overflow: "hidden" }}>
      <label>Website (leave blank)</label>
      <input type="text" tabIndex="-1" autoComplete="off" value={value} onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

async function submitForm({ form, data, captcha, honeypot }) {
  const r = await fetch("/api/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      form,
      data,
      honeypot,
      captcha: captcha.data ? { ...captcha.data, answer: captcha.answer } : null,
    }),
  });
  let json = {};
  try { json = await r.json(); } catch {}
  if (!r.ok) {
    const msg = (json && json.error) || "Something went wrong. Try again.";
    const isCaptcha = /captcha/i.test(msg);
    return { ok: false, error: msg, captcha: isCaptcha };
  }
  return { ok: true };
}

            </div>
            <div className="field">
              <label>Organization or business <span style={{ color: "var(--muted)", fontWeight: 400 }}>(optional)</span></label>
              <input type="text" value={data.organization} onChange={(e) => set("organization", e.target.value)} placeholder="If you're contributing on behalf of one" />
            </div>
          </div>

          <div className="field">
            <label>What would you like to contribute?</label>
            <div className="checks" style={{ marginTop: 8 }}>
              {DONATION_OPTIONS.map((o) => (
                <label key={o.id} className={`check ${data.category === o.id ? "is-on" : ""}`}>
                  <input type="radio" name="donation_category" value={o.id} checked={data.category === o.id} onChange={() => set("category", o.id)} />
                  <div>
                    <div className="check-title">{o.label}</div>
                  </div>
                </label>
              ))}
            </div>
            {errors.category && <div className="error-msg">{errors.category}</div>}
          </div>

          {data.category === "food" && (
            <div className="field">
              <label>About the dish</label>
              <div className="hint">
                We don't want there to be a barrier for participation. If you are donating a dish to share, we'll have a small community table where food is available for anyone. Please let us know what dish you'd like to bring, any common allergens, and approximately how many people it will serve.
              </div>
              <textarea value={data.foodDetails} onChange={(e) => set("foodDetails", e.target.value)} placeholder="Vegetable lasagna — contains gluten and dairy — serves about 12" />
              {errors.foodDetails && <div className="error-msg">{errors.foodDetails}</div>}
            </div>
          )}

          <div className="field">
            <label>Anything else you'd like to tell us about what you'd like to donate? <span style={{ color: "var(--muted)", fontWeight: 400 }}>(optional)</span></label>
            <textarea value={data.notes} onChange={(e) => set("notes", e.target.value)} />
          </div>

          <CaptchaField captcha={captcha} error={errors.captcha} />
          {errors.submit && <div className="error-msg">{errors.submit}</div>}

          <div>
            <button type="submit" className="btn btn-primary" disabled={submitting}>
              {submitting ? "Sending…" : "Send"}
            </button>
          </div>
        </div>
      </form>

      <section className="container-narrow" style={{ padding: "16px 0 96px" }}>
        <div style={{ background: "var(--cream)", border: "1px solid var(--rule)", borderRadius: 14, padding: "24px 28px" }}>
          <strong style={{ display: "block", marginBottom: 6 }}>Sponsoring the event</strong>
          <p style={{ margin: 0, fontSize: 15, color: "var(--ink-soft)" }}>
            If you'd like to sponsor the event, please reach out to the Pleasanton Downtown Association: <a href="mailto:gabrielle@pleasantondowntown.net" style={{ color: "var(--forest)", textDecoration: "underline" }}>gabrielle@pleasantondowntown.net</a>
          </p>
        </div>
      </section>
    </div>
  );
}

/* ─── App ─── */
function App() {
  const parseHash = () => (window.location.hash || "#home").replace(/^#\/?/, "") || "home";
  const [route, setRoute] = React.useState(parseHash());

  React.useEffect(() => {
    const onHash = () => setRoute(parseHash());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  React.useEffect(() => {
    if (route === "home" && window.__scrollAfterRoute) {
      const id = window.__scrollAfterRoute;
      window.__scrollAfterRoute = null;
      setTimeout(() => {
        document.getElementById(id)?.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 80);
    }
  }, [route]);

  const go = (id) => {
    if (window.location.hash.replace(/^#\/?/, "") !== id) {
      window.location.hash = "#" + id;
    }
    if (!window.__scrollAfterRoute) {
      window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
    }
  };

  let page;
  switch (route) {
    case "host": page = <HostPage go={go} />; break;
    case "volunteer": page = <VolunteerPage go={go} />; break;
    case "share": page = <SharePage go={go} />; break;
    case "faq": page = <FaqPage go={go} />; break;
    case "donate": page = <DonatePage go={go} />; break;
    case "sponsor": page = <DonatePage go={go} />; break;
    case "signup": page = <SignupPage go={go} />; break;
    case "contact": page = <ContactPage go={go} />; break;
    case "home":
    default: page = <Home go={go} />;
  }

  return (
    <React.Fragment>
      <Nav route={route} go={go} />
      <main key={route}>{page}</main>
      <Footer go={go} />
      <ToastHost />
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
