<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pleasanton Connects · The Longest Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
:root {
  --forest: #2f5d3a;
  --forest-deep: #1f4429;
  --forest-soft: #4a7a52;
  --terracotta: #c76f3d;
  --terracotta-deep: #a85a2c;
  --brown: #7a4e2a;
  --teal: #4a7a7e;
  --gold: #d9a44a;
  --cream: #f6efe3;
  --cream-warm: #f1e8d6;
  --paper: #fbf6ec;
  --ink: #1f2a22;
  --ink-soft: #3a463d;
  --muted: #6f7a70;
  --rule: #e3dac5;
  --rule-soft: #ece4d0;
  --serif: "Newsreader", "Tiempos Text", Georgia, "Times New Roman", serif;
  --sans: "DM Sans", "Söhne", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  color: var(--ink);
  background: var(--paper);
  font-size: 17px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
a { color: inherit; }
img { max-width: 100%; display: block; }
.serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
.mono { font-family: var(--mono); }
h1, h2, h3, h4 { font-family: var(--serif); font-weight: 400; letter-spacing: -0.015em; margin: 0; line-height: 1.08; text-wrap: balance; }
h1 { font-size: clamp(40px, 5vw, 76px); }
h2 { font-size: clamp(32px, 3.6vw, 52px); line-height: 1.1; }
h3 { font-size: clamp(22px, 2vw, 30px); line-height: 1.2; }
h4 { font-size: 20px; }
p { margin: 0 0 1em; text-wrap: pretty; }
.eyebrow {
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
  color: var(--forest);
}
.container { width: min(1200px, 100% - 48px); margin: 0 auto; }
.container-narrow { width: min(760px, 100% - 48px); margin: 0 auto; }
.container-wide { width: min(1380px, 100% - 48px); margin: 0 auto; }
section { padding: 96px 0; }
@media (max-width: 720px) { section { padding: 64px 0; } }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 500;
  border-radius: 999px;
  border: 1px solid transparent;
  cursor: pointer;
  text-decoration: none;
  transition: transform .15s ease, background .15s ease, color .15s ease, border-color .15s ease;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--forest); color: var(--paper); }
.btn-primary:hover { background: var(--forest-deep); }
.btn-terracotta { background: var(--terracotta); color: var(--paper); }
.btn-terracotta:hover { background: var(--terracotta-deep); }
.btn-ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
.btn-ghost:hover { background: var(--ink); color: var(--paper); }
.btn-cream { background: var(--cream); color: var(--ink); border-color: var(--rule); }
.btn-cream:hover { background: var(--cream-warm); }
.btn-link {
  background: none; border: 0; padding: 0;
  font-family: var(--sans); font-size: 15px; cursor: pointer;
  color: var(--forest); text-decoration: underline; text-underline-offset: 4px;
  text-decoration-thickness: 1px;
}
.btn-link:hover { color: var(--terracotta); }
.form-grid { display: grid; gap: 22px; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field label {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
}
.field .hint { font-size: 13px; color: var(--muted); margin-top: -2px; }
.field input[type="text"],
.field input[type="email"],
.field input[type="tel"],
.field input[type="number"],
.field select,
.field textarea {
  font-family: var(--sans);
  font-size: 16px;
  padding: 12px 14px;
  border: 1px solid var(--rule);
  border-radius: 8px;
  background: var(--paper);
  color: var(--ink);
  outline: none;
  transition: border-color .15s ease, box-shadow .15s ease;
  width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--forest);
  box-shadow: 0 0 0 3px rgba(47, 93, 58, 0.15);
}
.field textarea { min-height: 100px; resize: vertical; }
.field-error input, .field-error select, .field-error textarea {
  border-color: var(--terracotta-deep);
  box-shadow: 0 0 0 3px rgba(167, 90, 44, 0.12);
}
.field .error-msg { font-size: 13px; color: var(--terracotta-deep); }
.checks { display: flex; flex-direction: column; gap: 10px; }
.check {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--rule);
  border-radius: 10px;
  background: var(--paper);
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.check:hover { border-color: var(--forest-soft); }
.check.is-on { border-color: var(--forest); background: rgba(47, 93, 58, 0.05); }
.check input { margin-top: 4px; accent-color: var(--forest); }
.check .check-title { font-weight: 500; }
.check .check-desc { font-size: 14px; color: var(--muted); margin-top: 2px; }
.check .check-meta { font-size: 13px; color: var(--forest); margin-top: 4px; font-weight: 500; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 999px;
  border: 1px solid var(--rule); background: var(--paper);
  font-size: 14px; cursor: pointer;
  transition: border-color .15s, background .15s, color .15s;
}
.chip:hover { border-color: var(--forest-soft); }
.chip.is-on { background: var(--forest); color: var(--paper); border-color: var(--forest); }
.radio-row { display: flex; gap: 8px; flex-wrap: wrap; }
.radio-row label {
  padding: 10px 18px;
  border: 1px solid var(--rule);
  border-radius: 999px;
  cursor: pointer;
  font-size: 14px;
  background: var(--paper);
}
.radio-row input { display: none; }
.radio-row label.is-on { background: var(--forest); color: var(--paper); border-color: var(--forest); }
.card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 14px;
  padding: 28px;
}
.card-warm {
  background: var(--cream);
  border: 1px solid var(--rule);
  border-radius: 14px;
}
.divider { height: 1px; background: var(--rule); border: 0; margin: 0; }
.kbd-rule {
  border: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--rule) 20%, var(--rule) 80%, transparent);
  margin: 48px 0;
}
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(31, 42, 34, 0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  padding: 24px;
  animation: fadeIn .2s ease;
}
.modal {
  background: var(--paper);
  border-radius: 16px;
  max-width: 560px;
  width: 100%;
  max-height: 86vh;
  overflow: auto;
  padding: 36px;
  position: relative;
  animation: pop .2s ease;
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px; border-radius: 999px;
  border: 1px solid var(--rule); background: var(--paper); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.modal-close:hover { background: var(--cream); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }
@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(47, 93, 58, 0.4); }
  100% { box-shadow: 0 0 0 14px rgba(47, 93, 58, 0); }
}
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--paper);
  padding: 12px 22px; border-radius: 999px;
  font-size: 14px; z-index: 300;
  box-shadow: 0 8px 30px rgba(0,0,0,0.18);
  animation: pop .2s ease;
}
.hero {
  position: relative;
  min-height: 92vh;
  color: var(--paper);
  display: flex; align-items: flex-end;
  overflow: hidden;
  background: var(--ink);
}
.hero-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  filter: saturate(1.05);
}
.hero-grad {
  position: absolute; inset: 0;
  background:
    linear-gradient(180deg, rgba(31,42,34,0.35) 0%, rgba(31,42,34,0) 35%, rgba(31,42,34,0.6) 78%, rgba(31,42,34,0.92) 100%);
}
.hero-inner { position: relative; padding: 0 0 80px; width: 100%; }
.hero h1 { font-size: clamp(48px, 7vw, 108px); line-height: 0.96; max-width: 16ch; }
.hero h1 em { font-style: italic; color: var(--gold); }
.hero p.lede { font-size: clamp(17px, 1.4vw, 21px); max-width: 56ch; opacity: 0.92; }
.hero-date {
  display: inline-flex; align-items: center; gap: 14px;
  padding: 8px 16px;
  border-radius: 999px;
  background: rgba(246, 239, 227, 0.14);
  border: 1px solid rgba(246, 239, 227, 0.3);
  backdrop-filter: blur(8px);
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.hero-date .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--gold); animation: pulse-ring 2s infinite; }
.logo-mark {
  display: inline-flex; align-items: center; gap: 12px;
  font-family: var(--serif); font-style: italic; font-size: 22px;
  color: var(--forest);
  text-decoration: none;
  font-weight: 500;
}
.logo-mark .small { font-family: var(--sans); font-style: normal; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-soft); display: block; line-height: 1; }
.logo-mark .stack { display: flex; flex-direction: column; gap: 3px; }
.logo-img { height: 44px; width: auto; }
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(251, 246, 236, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid transparent;
  transition: border-color .2s, background .2s;
}
.nav.scrolled { border-color: var(--rule); }
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0;
}
.nav-links { display: flex; align-items: center; gap: 6px; }
.nav-link {
  font-size: 14.5px; font-weight: 500;
  padding: 8px 14px; border-radius: 999px;
  background: none; border: 0; cursor: pointer;
  color: var(--ink); text-decoration: none;
  transition: background .15s;
}
.nav-link:hover { background: var(--cream); }
.nav-link.active { background: var(--forest); color: var(--paper); }
.nav-cta { margin-left: 8px; }
.nav-mobile-btn { display: none; }
@media (max-width: 880px) {
  .nav-links { display: none; }
  .nav-mobile-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--ink); color: var(--paper);
    padding: 10px 16px; border-radius: 999px; border: 0;
    font-size: 14px; cursor: pointer;
  }
}
.footer {
  background: var(--ink);
  color: var(--cream);
  padding: 80px 0 40px;
}
.footer a { color: var(--cream); text-decoration: none; }
.footer a:hover { color: var(--gold); }
.footer h4 { color: var(--paper); font-family: var(--sans); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 16px; }
.footer .btn-link { white-space: nowrap; text-decoration: none; }
.footer .btn-link:hover { color: var(--gold); text-decoration: none; }
@media (max-width: 880px) {
  .footer-grid { grid-template-columns: 1fr 1fr !important; }
}
@media (max-width: 520px) {
  .footer-grid { grid-template-columns: 1fr !important; }
}
.five-ways {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 18px;
}
@media (max-width: 1100px) { .five-ways { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 720px) { .five-ways { grid-template-columns: 1fr 1fr; } }
.way-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 16px;
  padding: 28px 24px 24px;
  display: flex; flex-direction: column;
  gap: 14px;
  cursor: pointer;
  text-align: left;
  font: inherit; color: inherit;
  transition: transform .2s ease, border-color .2s ease, background .2s ease;
}
.way-card:hover { transform: translateY(-3px); border-color: var(--forest); background: var(--cream); }
.way-card .way-icon {
  width: 56px; height: 56px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.way-card h3 { font-family: var(--serif); font-size: 26px; }
.way-card p { font-size: 14px; color: var(--muted); margin: 0; min-height: 38px; }
.way-card .way-cta { font-size: 14px; font-weight: 500; color: var(--forest); margin-top: auto; padding-top: 8px; }
.way-card .way-cta::after { content: " →"; transition: transform .2s; display: inline-block; }
.way-card:hover .way-cta::after { transform: translateX(4px); }
.photo {
  background: var(--rule-soft);
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}
.photo.placeholder {
  background-image:
    repeating-linear-gradient(45deg, rgba(122, 78, 42, 0.08) 0 12px, rgba(122, 78, 42, 0.02) 12px 24px);
  display: flex; align-items: center; justify-content: center;
  color: var(--brown);
  font-family: var(--mono);
  font-size: 12px;
  text-align: center;
  padding: 20px;
  min-height: 200px;
  border: 1px dashed rgba(122, 78, 42, 0.4);
}
.member-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 18px;
}
.member-card {
  display: flex; flex-direction: column; gap: 10px;
  cursor: pointer;
  text-align: left;
  background: none; border: 0; padding: 0; font: inherit; color: inherit;
}
.member-card .avatar {
  aspect-ratio: 1;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--cream-warm), var(--rule));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 32px; color: var(--brown);
  transition: transform .2s ease;
}
.member-card:hover .avatar { transform: scale(1.02); box-shadow: 0 8px 24px rgba(31, 42, 34, 0.12); }
.member-card .meta { font-size: 13px; color: var(--muted); }
.member-card .name { font-family: var(--serif); font-size: 19px; }
.pull-quote {
  font-family: var(--serif);
  font-size: clamp(28px, 3vw, 42px);
  line-height: 1.2;
  color: var(--ink);
  border-left: 3px solid var(--terracotta);
  padding: 8px 0 8px 24px;
  margin: 32px 0;
  font-style: italic;
}
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 24px; }
.stat .num { font-family: var(--serif); font-size: 56px; line-height: 1; color: var(--forest); }
.stat .lbl { font-size: 14px; color: var(--muted); margin-top: 6px; }
.share-block {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 20px;
}
.share-block .share-head {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.share-block pre {
  margin: 0;
  font-family: var(--sans);
  font-size: 15px;
  white-space: pre-wrap;
  line-height: 1.5;
  color: var(--ink);
}
.tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px;
  background: var(--cream); color: var(--forest);
  font-size: 12px; letter-spacing: 0.04em; font-weight: 500;
}
.tag.terra { background: rgba(199, 111, 61, 0.14); color: var(--terracotta-deep); }
.tag.teal { background: rgba(74, 122, 126, 0.14); color: var(--teal); }
.page-fade { animation: fadeUp .35s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.ty-card {
  background: var(--cream);
  border-radius: 18px;
  padding: 56px 48px;
  text-align: center;
  border: 1px solid var(--rule);
}
.ty-card .check-circle {
  width: 64px; height: 64px; border-radius: 999px;
  background: var(--forest); color: var(--paper);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  font-size: 28px;
}
.mobile-menu {
  position: fixed; inset: 0; background: var(--paper);
  z-index: 100;
  padding: 24px;
  display: flex; flex-direction: column; gap: 8px;
  animation: fadeIn .2s ease;
}
.mobile-menu .mm-close {
  align-self: flex-end;
  padding: 10px 18px;
  border-radius: 999px;
  border: 1px solid var(--rule);
  background: var(--paper);
  font: inherit;
  cursor: pointer;
}
.mobile-menu .nav-link { font-size: 28px; padding: 16px 0; font-family: var(--serif); }
.email-preview {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 12px;
  overflow: hidden;
  font-size: 14px;
}
.email-preview .ep-head {
  background: var(--cream);
  padding: 14px 20px;
  border-bottom: 1px solid var(--rule);
  font-size: 12px; color: var(--muted);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.email-preview .ep-body { padding: 24px 28px; }
.email-preview .ep-body p { margin: 0 0 12px; line-height: 1.55; }
.tree-mark { width: 36px; height: 36px; }
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>

<script type="text/babel">
/* ─── Icons ─── */
const Icon = {
  Ticket: ({ size = 28, color = "currentColor" }) => (

      <path d="M2 17l3-2" />
      <path d="M22 17l-3-2" />

  ),
  Plate: ({ size = 28, color = "currentColor" }) => (

      <circle cx="12" cy="12" r="9" />
      <circle cx="12" cy="12" r="5" />

  ),
  Megaphone: ({ size = 28, color = "currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 11v2a1 1 0 0 0 1 1h3l8 5V5L7 10H4a1 1 0 0 0-1 1z" />

  ),
  MapPin: ({ size = 18, color = "currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 22s7-7 7-12a7 7 0 0 0-14 0c0 5 7 12 7 12z" />
      <circle cx="12" cy="10" r="2.5" />
    </svg>

function ToastHost() {
  const [msg, setMsg] = React.useState(null);
  React.useEffect(() => {
    window.showToast = (m) => {
      setMsg(m);
      window.clearTimeout(window.__toastT);
      window.__toastT = setTimeout(() => setMsg(null), 2400);
    };
  }, []);
  if (!msg) return null;
  return <div className="toast">{msg}</div>;
}

function Modal({ open, onClose, children }) {
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose} aria-label="Close"><Icon.X /></button>
        {children}
      </div>
    </div>
  );
}

function HostPage({ go }) {
  const [data, setData] = React.useState({ name: "", email: "", phone: "", seats: 10, who: "", prior: "", notes: "" });
  const [errors, setErrors] = React.useState({});
  const [submitted, setSubmitted] = React.useState(false);
  const set = (k, v) => setData((d) => ({ ...d, [k]: v }));

  const submit = (e) => {
    e.preventDefault();
    const errs = {};
    if (!data.name.trim()) errs.name = "Tell us your name";
    if (!data.email.trim() || !/^[^@]+@[^@]+\.[^@]+$/.test(data.email)) errs.email = "We need a valid email to confirm";
    if (!data.prior) errs.prior = "Quick yes or no helps us match you";
    if (data.seats < 4 || data.seats > 20) errs.seats = "Somewhere between 4 and 20, please";
    setErrors(errs);
    if (Object.keys(errs).length) return;
    setSubmitted(true);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  if (submitted) {

function CopyBlock({ channel, body }) {
  const [copied, setCopied] = React.useState(false);
  const onCopy = async () => {
    try { await navigator.clipboard.writeText(body); } catch (e) {}
    setCopied(true);
    window.showToast(`${channel} copied`);
    setTimeout(() => setCopied(false), 1800);
  };
  return (
    <div className="share-block">
      <div className="share-head">
        <span>{channel}</span>
        <button className="btn-link" onClick={onCopy} style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "var(--forest)", textDecoration: "none" }}>
          {copied ? <React.Fragment><Icon.Check size={14} /> Copied</React.Fragment> : <React.Fragment><Icon.Copy size={14} /> Copy</React.Fragment>}
        </button>
      </div>
      <pre>{body}</pre>
    </div>
  );
}

  const [err, setErr] = React.useState({});

  const submit = (e) => {
    e.preventDefault();
    const errs = {};
    if (!data.name.trim()) errs.name = "Tell us your name";
    if (!data.email.trim() || !/^[^@]+@[^@]+\.[^@]+$/.test(data.email)) errs.email = "Valid email please";
    if (!data.newsletter && !data.volunteer && !data.keep) errs.opts = "Pick at least one";
    setErr(errs);
    if (Object.keys(errs).length) return;
    setSubmitted(true);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  if (submitted) {
    return (
      <div className="page-fade">
        <PageHeader eyebrow="You're on the list" title="Welcome." sub="We'll be in touch when there's something worth your inbox." go={go} />
        <ThankYou go={go} title={`Hi ${data.name.split(" ")[0]}.`}
          body="We'll send you a welcome note in the next day, then nothing until there's news. Promise."
          emailPreview={{
            subject: "Welcome to Pleasanton Connects",
            body: [
              `Hi ${data.name.split(" ")[0]},`,
              `Thanks for signing up. You're on the list for what you opted into and nothing more.`,
              `If you're wondering where to start, the Longest Table on June 6 is a great first step. Hosting a table is even better.`,
            ],
          }}
        />
      </div>
    );
  }

  return (
    <div className="page-fade">
      <PageHeader eyebrow="Sign Up" title="Stay in the loop." sub="Pick what you want to hear about. We send less than you'd expect." go={go} />
      <form className="container-narrow" style={{ padding: "56px 0 96px" }} onSubmit={submit} noValidate>
        <div className="form-grid">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 22 }}>
            <div className="field">
              <label>Your name</label>
              <input type="text" value={data.name} onChange={(e) => setData({ ...data, name: e.target.value })} />
              {err.name && <div className="error-msg">{err.name}</div>}
            </div>
            <div className="field">
              <label>Email</label>
              <input type="email" value={data.email} onChange={(e) => setData({ ...data, email: e.target.value })} />
              {err.email && <div className="error-msg">{err.email}</div>}
            </div>
          </div>
          <div className="field">
            <label>What do you want to hear about?</label>
            <div className="checks" style={{ marginTop: 8 }}>
              {[
                { k: "newsletter", t: "Monthly newsletter", d: "What the network is up to. About once a month, never more." },
                { k: "volunteer", t: "General volunteer interest", d: "Volunteer opportunities beyond the Longest Table." },
                { k: "keep", t: "Keep me posted on Pleasanton Connects", d: "Big-picture announcements only — new programs, the State of Connection, the Plan." },
              ].map((c) => (
                <label key={c.k} className={`check ${data[c.k] ? "is-on" : ""}`}>
                  <input type="checkbox" checked={data[c.k]} onChange={() => setData((d) => ({ ...d, [c.k]: !d[c.k] }))} />
                  <div>
                    <div className="check-title">{c.t}</div>
                    <div className="check-desc">{c.d}</div>
                  </div>
                </label>
              ))}
            </div>
            {err.opts && <div className="error-msg">{err.opts}</div>}
          </div>
          <div><button type="submit" className="btn btn-primary">Sign me up</button></div>
        </div>
      </form>
    </div>
  );
}

/* ─── App ─── */
function App() {
  const parseHash = () => (window.location.hash || "#home").replace(/^#\/?/, "") || "home";
  const [route, setRoute] = React.useState(parseHash());

  React.useEffect(() => {
    const onHash = () => setRoute(parseHash());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const go = (id) => {
    if (window.location.hash.replace(/^#\/?/, "") !== id) {
      window.location.hash = "#" + id;
    }
    window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
  };

  let page;
  switch (route) {
    case "host": page = <HostPage go={go} />; break;
    case "volunteer": page = <VolunteerPage go={go} />; break;
    case "dish": page = <DishPage go={go} />; break;
    case "share": page = <SharePage go={go} />; break;
    case "about": page = <AboutPage go={go} />; break;
    case "state": page = <StatePage go={go} />; break;
    case "plan": page = <PlanPage go={go} />; break;
    case "signup": page = <SignupPage go={go} />; break;
    case "contact": page = <ContactPage go={go} />; break;
    case "home":
    default: page = <Home go={go} />;
  }

  return (
    <React.Fragment>
      <Nav route={route} go={go} />
      <main key={route}>{page}</main>
      <Footer go={go} />
      <ToastHost />
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
